name: Draft Desktop Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: draft-release-main
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - name: Linux ARM64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - name: Windows x64
            runner: windows-2022
            target: x86_64-pc-windows-msvc
          - name: Windows ARM64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
          - name: macOS x64
            runner: macos-13
            target: x86_64-apple-darwin
          - name: macOS ARM64
            runner: macos-14
            target: aarch64-apple-darwin

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm install

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Generate release updater config
        shell: pwsh
        env:
          MOMENTS_UPDATER_PUBLIC_KEY: ${{ vars[format('{0}', 'MOMENTS_UPDATER_PUBLIC_KEY')] }}
          MOMENTS_UPDATER_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest.json
        run: |
          if ([string]::IsNullOrWhiteSpace($env:MOMENTS_UPDATER_PUBLIC_KEY)) {
            throw "Repository variable MOMENTS_UPDATER_PUBLIC_KEY must be set for signed updater builds."
          }

          $config = Get-Content "src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json
          if (-not $config.plugins) {
            $config | Add-Member -NotePropertyName plugins -NotePropertyValue ([pscustomobject]@{})
          }

          $config.plugins | Add-Member -Force -NotePropertyName updater -NotePropertyValue ([pscustomobject]@{
            pubkey = $env:MOMENTS_UPDATER_PUBLIC_KEY
            endpoints = @($env:MOMENTS_UPDATER_ENDPOINT)
            windows = [pscustomobject]@{
              installMode = "passive"
            }
          })

          $config | ConvertTo-Json -Depth 100 | Set-Content "src-tauri/tauri.release.conf.json"

      - name: Build Tauri app and upload release assets
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets[format('{0}', 'TAURI_SIGNING_PRIVATE_KEY')] }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets[format('{0}', 'TAURI_SIGNING_PRIVATE_KEY_PASSWORD')] }}
          MOMENTS_UPDATER_PUBLIC_KEY: ${{ vars[format('{0}', 'MOMENTS_UPDATER_PUBLIC_KEY')] }}
          MOMENTS_UPDATER_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest.json
        with:
          tagName: v__VERSION__
          releaseName: Moments v__VERSION__
          releaseBody: |
            Automated desktop build from `${{ github.sha }}`.

            This release is created as a draft so it can be reviewed and published manually.
            The assets include signed updater metadata for in-app updates after the draft is published.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: --config src-tauri/tauri.release.conf.json --target ${{ matrix.target }}
name: Draft Desktop Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create, for example v0.1.0
        required: true
        type: string
      release_name:
        description: Optional release name override
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: draft-release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - name: Linux ARM64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - name: Windows x64
            runner: windows-2022
            target: x86_64-pc-windows-msvc
          - name: Windows ARM64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
          - name: macOS x64
            runner: macos-13
            target: x86_64-apple-darwin
          - name: macOS ARM64
            runner: macos-14
            target: aarch64-apple-darwin

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm install

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Tauri app
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload bundled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/**
          if-no-files-found: error

  release:
    name: Create draft release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: bundle-*
          merge-multiple: true

      - name: Create or update GitHub draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.release_name != '' && inputs.release_name || format('Moments {0}', inputs.tag) }}
          body: |
            Automated desktop build for ${{ inputs.tag }}.

            This release is created as a draft so it can be reviewed and published manually.
          draft: true
          prerelease: false
          files: release-assets/**